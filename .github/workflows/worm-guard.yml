name: worm-guard
on:
  pull_request: { branches: ["**"] }
  push:         { branches: ["**"] }

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 1 }

      - name: Reject worm markers
        run: |
          # markers assembled from fragments so this file is never itself a hit:
          # loader var, payload preamble, PolinRider obfuscation sigs (March family
          # rmcej/otb + scrambled-constructor) and the April 2026 evasion variant
          # (per OpenSourceMalware/PolinRider multi-variant rule)
          M1="$(printf '_%s%s' '$' '_1e42')"
          M2="$(printf "global['%s']=" '!')"
          M3="$(printf 'rmcej%%%s%%' 'otb')"
          M4="$(printf 'wuqktam%s' 'ceigynzbosdctpusocrjhrflovnxrt')"
          M5="$(printf 'Cot%%3t%s' '=shtP')"
          if git grep -I -l -F -e "$M1" -e "$M2" -e "$M3" -e "$M4" -e "$M5" \
               -- ':!.github/workflows/worm-guard.yml' ':!.github/worm-guard/**' >/tmp/hits 2>/dev/null && [ -s /tmp/hits ]; then
            echo "::error::Worm payload marker found in:"; cat /tmp/hits; exit 1
          fi

      - name: Reject canonical worm blobs
        run: |
          for sha in 8e14837c2c9eb2fd21e15ddbd40b267491764593 \
                    5e226620d2e360205cc8634e3c581a008d382561 \
                    a5177abe1a03fb01906b2deb0bdfcc3201e8c832 \
                    934d55548c36ff0e330f2a2ba69bf74b10a7dcba \
                    51b1974952958055878c8531202048c561c6f3a2 \
                    963ef84d9d685b8debaef1aa574c18c76be5e148; do
            if git ls-tree -r HEAD | grep -q "$sha"; then
              echo "::error::Canonical worm blob $sha present in tree"; exit 1
            fi
          done

      - name: Reject worm cargo paths
        run: |
          for p in public/fonts/fa-solid-400.woff2 \
                   .vscode/tasks.json \
                   .vscode/launch.json \
                   .vscode/spellright.dict \
                   temp_auto_push.bat \
                   temp_interactive_push.bat \
                   branch_structure.json; do
            if [ -e "$p" ]; then
              echo "::error::Worm cargo path present: $p"; exit 1
            fi
          done

      - name: Reject .gitignore artifact lines
        run: |
          if [ -f .gitignore ]; then
            for a in temp_auto_push.bat temp_interactive_push.bat branch_structure.json config.bat; do
              if grep -qE "^${a}\$" .gitignore; then
                echo "::error::Worm .gitignore artifact line present: $a"; exit 1
              fi
            done
          fi

      - name: Reject disguised-binary assets and VS Code autorun
        run: |
          bad=0
          while IFS= read -r -d '' f; do
            case "$f" in
              *.woff|*.woff2|*.ttf|*.otf|*.eot|*.png|*.jpg|*.jpeg|*.gif|*.webp|*.ico|*.pdf)
                mime=$(file -b --mime-type "$f")
                case "$mime" in
                  text/*|application/javascript|application/x-shellscript|application/json)
                    echo "::error file=$f::extension claims a binary asset but content is '$mime' (planted script?)"
                    bad=1 ;;
                esac ;;
            esac
          done < <(git ls-files -z)
          if grep -rEl '"runOn"[[:space:]]*:[[:space:]]*"folderOpen"' .vscode/ 2>/dev/null; then
            echo "::error::VS Code task with runOn=folderOpen detected (auto-exec on folder open)"
            bad=1
          fi
          exit $bad

      - name: YARA scan (Forge core pack + PolinRider campaign rules)
        run: |
          set -uo pipefail
          sudo apt-get install -y -qq yara >/dev/null 2>&1
          curl -sSLo /tmp/forge.zip \
            https://github.com/YARAHQ/yara-forge/releases/latest/download/yara-forge-rules-core.zip
          unzip -qo /tmp/forge.zip -d /tmp/forge
          # scan tracked files only (skips .git/), excluding the vendored rules themselves
          git ls-files -z -- ':!.github/worm-guard/**' > /tmp/files.z
          xargs -0 -r yara -w /tmp/forge/packages/core/yara-rules-core.yar < /tmp/files.z > /tmp/yara-hits.txt 2>/dev/null || true
          xargs -0 -r yara -w .github/worm-guard/campaign-rules.yar     < /tmp/files.z >> /tmp/yara-hits.txt 2>/dev/null || true
          if [ -s /tmp/yara-hits.txt ]; then
            echo "::error::YARA detections (rule + file):"; sort -u /tmp/yara-hits.txt; exit 1
          fi
